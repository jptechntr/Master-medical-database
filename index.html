<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Medicine Database</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        th { background-color: #4CAF50; color: white; text-align: left; }
    </style>
</head>
<body>
    <h1>Medicine Database</h1>
    <input type="text" id="searchInput" placeholder="Search for medicines..." onkeyup="filterTable()">
    <table id="medicinesTable">
        <thead>
            <tr>
                <th>Brand Name</th>
                <th>Composition</th>
                <th>Category</th>
                <th>HSN Code</th>
                <th>Manufacture</th>
                <th>Barcode</th>
            </tr>
        </thead>
        <tbody id="medicinesBody">
            <!-- Rows will be inserted here dynamically -->
        </tbody>
    </table>

    <script>
        // Function to load CSV data and display it in the table
        async function loadCSV() {
            const response = await fetch('medicines_master_dataset.csv');
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            const tableBody = document.getElementById('medicinesBody');

            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length > 1) {
                    const tr = document.createElement('tr');
                    cols.forEach(col => {
                        const td = document.createElement('td');
                        td.textContent = col;
                        tr.appendChild(td);
                    });
                    tableBody.appendChild(tr);
                }
            });
        }

        function filterTable() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const table = document.getElementById('medicinesTable');
            const tr = table.getElementsByTagName('tr');

            for (let i = 1; i < tr.length; i++) {
                const td = tr[i].getElementsByTagName('td');
                let found = false;
                for (let j = 0; j < td.length; j++) {
                    if (td[j].textContent.toLowerCase().includes(filter)) {
                        found = true;
                        break;
                    }
                }
                tr[i].style.display = found ? '' : 'none';
            }
        }

        window.onload = loadCSV;
    </script>
</body>
</html>
