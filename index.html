<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicines Dataset</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Medicines Dataset</h1>
    <input type="text" id="searchInput" onkeyup="searchFunction()" placeholder="Search for medicines..">
    <table id="medicinesTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Dose</th>
                <th>Form</th>
                <th>Manufacturer</th>
            </tr>
        </thead>
        <tbody>
            <!-- Example rows; these should be replaced with actual data -->
            <tr>
                <td>Aspirin</td>
                <td>Pain reliever</td>
                <td>500mg</td>
                <td>Tablet</td>
                <td>Bayer</td>
            </tr>
            <tr>
                <td>Ibuprofen</td>
                <td>Pain reliever</td>
                <td>200mg</td>
                <td>Tablet</td>
                <td>Advil</td>
            </tr>
        </tbody>
    </table>

    <script>
        function searchFunction() {
            let input = document.getElementById('searchInput');
            let filter = input.value.toLowerCase();
            let table = document.getElementById("medicinesTable");
            let tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td");
                let found = false;
                for (let j = 0; j < td.length; j++) {
                    if (td[j]) {
                        let txtValue = td[j].textContent || td[j].innerText;
                        if (txtValue.toLowerCase().indexOf(filter) > -1) {
                            found = true;
                            break;
                        }
                    }
                }
                tr[i].style.display = found ? "" : "none";
            }
        }
    </script>
</body>
</html>
